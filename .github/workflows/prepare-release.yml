name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Target version (e.g., 2.9.0)'
        required: true
        type: string
      branch:
        description: 'Branch to release from'
        required: true
        default: 'master'
        type: string

jobs:
  bump-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.branch }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0 # Fetch all history so we can push back to branches

      - name: Update version and Tag
        run: |
          # 1. Get raw input
          RAW_VERSION=${{ github.event.inputs.version }}
          
          # 2. Normalize: Remove 'v' prefix if user accidentally included it to get the pure version number (e.g., v1.2.3 -> 1.2.3)
          VERSION=${RAW_VERSION#v}
          
          # 3. Update version in Cargo.toml
          sed -i "0,/^version = .*/s//version = \"$VERSION\"/" Cargo.toml
          
          # 4. Commit and Push changes
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml
          git commit -m "chore: bump version to $VERSION"
          git push origin ${{ github.event.inputs.branch }}
          
          # 5. Create Tag (Ensure it starts with 'v') and Push
          NEW_TAG="v$VERSION"
          git tag $NEW_TAG
          git push origin $NEW_TAG

      - name: Create GitHub Release
        run: |
          # 这个 API 会直接创建一个正式的 Release 
          # 绑定你刚刚推上去的那个 Tag
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/releases \
            -d '{
              "tag_name":"v${{ github.event.inputs.version }}",
              "name":"Release v${{ github.event.inputs.version }}",
              "body":"Automated release for version ${{ github.event.inputs.version }}",
              "draft":false,
              "prerelease":false,
              "generate_release_notes":true
            }'