name: macOS CI

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build"
        required: true
      prerelease_flag:
        description: "是否标记为预发布 (Pre-release)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            app-suffix: ""
            os: self-hosted
          - target: aarch64-apple-darwin
            app-suffix: ""
            os: macos-latest

    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
  
    steps:
    - uses: actions/checkout@v5
      with:
        submodules: recursive
        repository: MrCreativ3001/moonlight-web-stream
        ref: ${{ github.event.inputs.tag }}
  
    # Install node
    - uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: npm
  
    # Install rust
    - uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: nightly
    - uses: Swatinem/rust-cache@v2
      with:
        shared-key: cross-${{ matrix.target }}
  
    # Install cross
    - name: Install Cross
      if: runner.os != 'macOS'
      run: cargo install cross --git https://github.com/cross-rs/cross

    - name: Install Rust target (macOS only)
      if: runner.os == 'macOS'
      run: rustup target add ${{ matrix.target }}
  
    # Build
    - name: Build
      run: |
        if [[ "${{ runner.os }}" == "macOS" ]]; then
          if [[ "${{ runner.arch }}" == "X64" ]]; then
            export RUSTFLAGS="-C link-arg=$(ls /Library/Developer/CommandLineTools/usr/lib/clang/*/lib/darwin/libclang_rt.osx.a | head -n 1)"
          fi
          cargo build --release --target ${{ matrix.target }}
        else
          cross build --release --target ${{ matrix.target }}
        fi
  
        npm ci
        npm run build
        mv dist static
  
        rm -rf streamer${{ matrix.app-suffix }} web-server${{ matrix.app-suffix }}
        mv target/${{ matrix.target }}/release/streamer${{ matrix.app-suffix }} streamer${{ matrix.app-suffix }}
        mv target/${{ matrix.target }}/release/web-server${{ matrix.app-suffix }} web-server${{ matrix.app-suffix }}
        chmod +x streamer${{ matrix.app-suffix }} web-server${{ matrix.app-suffix }}
  
    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: moonlight-web-${{ matrix.target }}
        path: |
          streamer${{ matrix.app-suffix }}
          web-server${{ matrix.app-suffix }}
          static

  release:
    name: Publish GitHub Release Artifacts
    runs-on: ubuntu-latest
    needs: build

    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            suffix: ""
          - target: aarch64-apple-darwin
            suffix: ""

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: moonlight-web-${{ matrix.target }}
          path: dist

      - name: Create archive
        run: |
          mkdir package
          mv dist/streamer${{ matrix.suffix }} package/
          mv dist/web-server${{ matrix.suffix }} package/
          mv dist/static package/

          ARCHIVE="moonlight-web-${{ matrix.target }}"

          if [[ "${{ matrix.suffix }}" == ".exe" ]]; then
            zip -r "$ARCHIVE.zip" package
            echo "ASSET=$ARCHIVE.zip" >> $GITHUB_ENV
          else
            tar -czf "$ARCHIVE.tar.gz" package
            echo "ASSET=$ARCHIVE.tar.gz" >> $GITHUB_ENV
          fi

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: "Release ${{ github.event.inputs.tag }} (macOS Build)"
          # 这里引用也要同步修改
          prerelease: ${{ github.event.inputs.prerelease_flag }}
          files: ${{ env.ASSET }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
