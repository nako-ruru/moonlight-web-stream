name: macOS CI

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "要构建的 Tag (对应母仓库版本号)"
        required: true
      run_x86:
        description: "是否构建 macOS x86_64 (需要开启 Self-hosted)"
        type: boolean
        default: false
      prerelease_flag:
        description: "是否标记为预发布 (Pre-release)"
        type: boolean
        default: false
      draft_flag:
        description: "是否存为草稿 (Draft)"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  # 1. 动态生成 Matrix
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          # 默认包含 ARM (GitHub Runner)
          CONF='{"include":[{"target":"aarch64-apple-darwin","os":"macos-latest","suffix":""}'
          
          # 如果勾选了 x86，则加入 self-hosted 任务
          if [ "${{ github.event.inputs.run_x86 }}" == "true" ]; then
            CONF+=',{"target":"x86_64-apple-darwin","os":"self-hosted","suffix":""}'
          fi
          
          CONF+=']}'
          echo "matrix=$CONF" >> $GITHUB_OUTPUT

  build:
    needs: setup-matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
          repository: MrCreativ3001/moonlight-web-stream
          ref: ${{ github.event.inputs.tag }}

      # Install node
      - uses: actions/setup-node@v6
        with:
          node-version:  24

      # Install rust
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly-2026-02-13
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cross-${{ matrix.target }}

      # Install cross
      - name: Install Cross
        if: runner.os != 'macOS'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install Rust target (macOS only)
        if: runner.os == 'macOS'
        run: rustup target add ${{ matrix.target }}

          # Build
      - name: Build
        run: |
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            if [[ "${{ runner.arch }}" == "X64" ]]; then
              export RUSTFLAGS="-C link-arg=$(ls /Library/Developer/CommandLineTools/usr/lib/clang/*/lib/darwin/libclang_rt.osx.a | head -n 1)"
            fi    
            cargo build --release --target ${{ matrix.target }}
          else
            cross build --release --target ${{ matrix.target }}
          fi

          npm ci
          npm run build
          mv dist static
          
          rm -rf streamer${{ matrix.app-suffix }} web-server${{ matrix.app-suffix }}
          mv target/${{ matrix.target }}/release/streamer${{ matrix.app-suffix }} streamer${{ matrix.app-suffix }}
          mv target/${{ matrix.target }}/release/web-server${{ matrix.app-suffix }} web-server${{ matrix.app-suffix }}
          chmod +x streamer${{ matrix.app-suffix }} web-server${{ matrix.app-suffix }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: moonlight-web-${{ matrix.target }}
          path: |
            streamer${{ matrix.app-suffix }}
            web-server${{ matrix.app-suffix }}
            static

  release:
    name: Publish GitHub Release Artifacts
    runs-on: ubuntu-latest
    needs: [setup-matrix, build]
    strategy:
      matrix: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: moonlight-web-${{ matrix.target }}
          path: dist

      - name: Create archive
        run: |
          mkdir package
          mv dist/streamer${{ matrix.suffix }} package/
          mv dist/web-server${{ matrix.suffix }} package/
          mv dist/static package/

          ARCHIVE="moonlight-web-${{ matrix.target }}"

          if [[ "${{ matrix.suffix }}" == ".exe" ]]; then
            zip -r "$ARCHIVE.zip" package
            echo "ASSET=$ARCHIVE.zip" >> $GITHUB_ENV
          else
            tar -czf "$ARCHIVE.tar.gz" package
            echo "ASSET=$ARCHIVE.tar.gz" >> $GITHUB_ENV
          fi

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: "Release ${{ github.event.inputs.tag }} (macOS Build)"
          # 这里引用也要同步修改
          prerelease: ${{ github.event.inputs.prerelease_flag }}
          files: ${{ env.ASSET }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create static.zip
        if: matrix.target == 'aarch64-apple-darwin'
        run: |
          cd package
          zip -r ../static.zip static

      - name: Upload static.zip to release
        if: matrix.target == 'aarch64-apple-darwin'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          draft: ${{ github.event.inputs.draft_flag }}
          prerelease: ${{ github.event.inputs.prerelease_flag }}
          files: static.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
